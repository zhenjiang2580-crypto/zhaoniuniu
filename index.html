<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>找牛牛</title>
  <meta property="og:title" content="找牛牛">
  <meta property="og:description" content="找出全部牛牛，点空白格扣生命">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #e8e8e8;
      padding: 20px;
    }
    
    .game-container {
      background: rgba(22, 33, 62, 0.9);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 5px;
    }
    
    .color-legend {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: #8b9aaa;
    }
    
    .color-legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .color-legend .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    
    .color-legend .swatch.c0 { background: #264a73; }
    .color-legend .swatch.c1 { background: #235544; }
    .color-legend .swatch.c2 { background: #4e3880; }
    
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #415a77;
      border-radius: 10px;
      background: #1b263b;
      color: #a0a0a0;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    
    .mode-btn.active {
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border-color: #e94560;
      color: white;
      font-weight: 700;
    }
    
    .mode-btn:active {
      transform: scale(0.98);
    }
    
    .mines-count, .lives-display, .status {
      font-size: 0.9rem;
      color: #a0a0a0;
    }
    
    .lives-display { color: #f87171; }
    
    .status.win { color: #4ade80; }
    .status.lose { color: #f87171; }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-template-rows: repeat(4, 80px);
      gap: 4px;
      background: #0d1b2a;
      padding: 16px;
      border-radius: 16px;
    }
    
    .cell {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      font-size: 2.2rem;
      font-weight: 700;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    
    .cell.color-0 { background: linear-gradient(145deg, #1e3a5f 0%, #264a73 100%); }
    .cell.color-1 { background: linear-gradient(145deg, #1a3d32 0%, #235544 100%); }
    .cell.color-2 { background: linear-gradient(145deg, #3d2a5f 0%, #4e3880 100%); }
    
    .cell:hover:not(.revealed):not(.flagged),
    .cell:active:not(.revealed):not(.flagged) {
      filter: brightness(1.2);
      transform: scale(1.05);
    }
    
    .cell.revealed {
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
      border-color: rgba(255,255,255,0.3);
      cursor: default;
    }
    
    .cell.revealed.blank-mark {
      color: #f87171;
      font-size: 2.8rem;
      font-weight: 800;
    }
    
    .cell.flagged {
      color: #e94560;
    }
    
    .cell.revealed.mine {
      color: #f87171;
    }
    
    .cell.revealed.mine img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }
    
    .restart-btn {
      margin-top: 20px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-family: inherit;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }
    
    .hint {
      margin-top: 15px;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🐄 找牛牛</h1>
    <div class="info-bar">
      <span class="lives-display">❤️ 生命: <span id="livesDisplay">3</span></span>
      <span class="mines-count">牛牛: <span id="minesDisplay">0</span>/3</span>
      <span class="status" id="status"></span>
    </div>
    <div class="color-legend">
      <span><i class="swatch c0"></i>色组1</span>
      <span><i class="swatch c1"></i>色组2</span>
      <span><i class="swatch c2"></i>色组3</span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="revealBtn" data-mode="reveal">📖 翻开</button>
      <button class="mode-btn" id="flagBtn" data-mode="flag">🚩 标记</button>
    </div>
    <div class="grid" id="grid"></div>
    <button class="restart-btn" id="restartBtn">重新开始</button>
    <p class="hint">每色1牛 · 每牛9宫格内无他牛 · 每行每列各1牛</p>
  </div>

  <script>
    const ROWS = 4;
    const COLS = 4;
    const MINES = 3;
    const LIVES = 3;

    let grid = [];
    let minePositions = [];
    let minesRevealed = 0;
    let flaggedCount = 0;
    let lives = LIVES;
    let gameOver = false;
    let currentMode = 'reveal'; // 'reveal' 或 'flag'
    let initRetryCount = 0;

    const gridEl = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const minesDisplayEl = document.getElementById('minesDisplay');
    const livesDisplayEl = document.getElementById('livesDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const revealBtn = document.getElementById('revealBtn');
    const flagBtn = document.getElementById('flagBtn');

    function initGame() {
      grid = [];
      minePositions = [];
      minesRevealed = 0;
      flaggedCount = 0;
      lives = LIVES;
      gameOver = false;
      statusEl.textContent = '';
      statusEl.className = 'status';
      minesDisplayEl.textContent = '0';
      livesDisplayEl.textContent = LIVES;
      currentMode = 'reveal';
      updateModeButtons();

      // 创建位置数组并打乱，用于分配颜色
      const positions = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          positions.push([r, c]);
        }
      }
      shuffle(positions);

      // 创建空网格并分配颜色
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = { isMine: false, revealed: false, flagged: false, colorIndex: -1 };
        }
      }
      positions.forEach(([r, c], i) => {
        grid[r][c].colorIndex = Math.floor(i / (ROWS * COLS / MINES));
      });

      // 雷的生成规则：每色1雷、每雷周围9宫格无其他雷、每行每列各1雷
      if (!placeMinesWithRules()) {
        if (++initRetryCount < 20) {
          initGame();
          return;
        }
        initRetryCount = 0;
        // 回退：仅满足每色1雷
        for (let color = 0; color < MINES; color++) {
          const cells = [];
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c].colorIndex === color) cells.push([r, c]);
          const [r, c] = cells[Math.floor(Math.random() * cells.length)];
          grid[r][c].isMine = true;
          minePositions.push([r, c]);
        }
      } else {
        initRetryCount = 0;
      }

      // 默认随机显示一个雷
      const hintMine = minePositions[Math.floor(Math.random() * minePositions.length)];
      grid[hintMine[0]][hintMine[1]].revealed = true;
      minesRevealed = 1;
      minesDisplayEl.textContent = '1';

      renderGrid();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function placeMinesWithRules() {
      // 按颜色分组
      const colorGroups = [[], [], []];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          colorGroups[grid[r][c].colorIndex].push([r, c]);
        }
      }
      const inSame9Grid = (r1, c1, r2, c2) =>
        Math.abs(r1 - r2) <= 1 && Math.abs(c1 - c2) <= 1;
      const validWith = (pos, existing) => {
        const [r, c] = pos;
        for (const [er, ec] of existing) {
          if (r === er || c === ec || inSame9Grid(r, c, er, ec)) return false;
        }
        return true;
      };

      for (let attempt = 0; attempt < 500; attempt++) {
        shuffle(colorGroups[0]);
        shuffle(colorGroups[1]);
        shuffle(colorGroups[2]);
        const chosen = [];
        for (let color = 0; color < MINES; color++) {
          const valid = colorGroups[color].filter((pos) => validWith(pos, chosen));
          if (valid.length === 0) break;
          chosen.push(valid[Math.floor(Math.random() * valid.length)]);
        }
        if (chosen.length === MINES) {
          chosen.forEach(([r, c]) => {
            grid[r][c].isMine = true;
            minePositions.push([r, c]);
          });
          return true;
        }
      }
      return false;
    }

    function renderGrid() {
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cellData = grid[r][c];
          const cell = document.createElement('div');
          cell.className = `cell color-${cellData.colorIndex}`;
          cell.dataset.r = r;
          cell.dataset.c = c;
          if (cellData.revealed) {
            cell.classList.add('revealed');
            if (cellData.isMine) {
              cell.classList.add('mine');
              const img = document.createElement('img');
              img.src = 'mine-icon.png';
              img.alt = '牛牛';
              cell.appendChild(img);
            } else {
              cell.classList.add('blank-mark');
              cell.textContent = '×';
            }
          } else if (cellData.flagged) {
            cell.classList.add('flagged');
            cell.textContent = '🚩';
          }

          cell.addEventListener('click', (e) => {
            e.preventDefault();
            if (currentMode === 'reveal') {
              handleClick(r, c);
            } else {
              handleRightClick(r, c);
            }
          });
          cell.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            handleRightClick(r, c);
          });

          gridEl.appendChild(cell);
        }
      }
    }

    function handleClick(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed || cell.flagged) return;

      cell.revealed = true;

      if (cell.isMine) {
        minesRevealed++;
        minesDisplayEl.textContent = minesRevealed;
        checkWin();
        renderGrid();
        return;
      }

      // 点击空白区域（安全格）损失1生命
      lives--;
      livesDisplayEl.textContent = lives;
      if (lives <= 0) {
        gameOver = true;
        revealAllMines();
        statusEl.textContent = '💔 生命耗尽！';
        statusEl.classList.add('lose');
      }

      renderGrid();
    }

    function handleRightClick(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed) return;

      cell.flagged = !cell.flagged;
      renderGrid();
    }

    function revealAllMines() {
      minePositions.forEach(([r, c]) => {
        grid[r][c].revealed = true;
      });
      renderGrid();
    }

    function checkWin() {
      if (minesRevealed === MINES) {
        gameOver = true;
        statusEl.textContent = '🎉 全部牛牛已找出！';
        statusEl.classList.add('win');
      }
    }

    function updateModeButtons() {
      revealBtn.classList.toggle('active', currentMode === 'reveal');
      flagBtn.classList.toggle('active', currentMode === 'flag');
    }

    revealBtn.addEventListener('click', (e) => {
      e.preventDefault();
      currentMode = 'reveal';
      updateModeButtons();
    });
    flagBtn.addEventListener('click', (e) => {
      e.preventDefault();
      currentMode = 'flag';
      updateModeButtons();
    });
    restartBtn.addEventListener('click', initGame);

    initGame();
  </script>
</body>
</html>
