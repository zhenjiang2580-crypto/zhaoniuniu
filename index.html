<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>找牛牛</title>
  <meta property="og:title" content="找牛牛">
  <meta property="og:description" content="找出全部牛牛，点空白格扣生命">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #e8e8e8;
      padding: 20px;
    }
    
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(22, 33, 62, 0.9);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.8rem;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 5px;
      width: 100%;
      max-width: 400px;
    }
    
    .color-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 12px;
      font-size: 0.75rem;
      color: #8b9aaa;
      max-width: 100%;
    }
    
    .color-legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    
    .color-legend .swatch {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }
    
    .color-legend .swatch.c0 { background: #2563eb; }
    .color-legend .swatch.c1 { background: #16a34a; }
    .color-legend .swatch.c2 { background: #7c3aed; }
    .color-legend .swatch.c3 { background: #ea580c; }
    .color-legend .swatch.c4 { background: #0d9488; }
    .color-legend .swatch.c5 { background: #db2777; }
    .color-legend .swatch.c6 { background: #65a30d; }
    .color-legend .swatch.c7 { background: #d97706; }
    .color-legend .swatch.c8 { background: #4f46e5; }
    .color-legend .swatch.c9 { background: #dc2626; }
    
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      width: 100%;
      max-width: 400px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #415a77;
      border-radius: 10px;
      background: #1b263b;
      color: #a0a0a0;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    
    .mode-btn.active {
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border-color: #e94560;
      color: white;
      font-weight: 700;
    }
    
    .mode-btn:active {
      transform: scale(0.98);
    }
    
    .mines-count, .lives-display, .status {
      font-size: 0.9rem;
      color: #a0a0a0;
    }
    
    .lives-display { color: #f87171; }
    
    .status.win { color: #4ade80; }
    .status.lose { color: #f87171; }
    
    .grid {
      display: grid;
      gap: 4px;
      background: #0d1b2a;
      padding: 16px;
      border-radius: 16px;
      margin: 0 auto;
    }
    
    .cell {
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      cursor: pointer;
      font-size: 2.2rem;
      font-weight: 700;
      transition: all 0.15s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    
    .cell.color-0 { background: linear-gradient(145deg, #1d4ed8 0%, #2563eb 100%); }
    .cell.color-1 { background: linear-gradient(145deg, #15803d 0%, #16a34a 100%); }
    .cell.color-2 { background: linear-gradient(145deg, #6d28d9 0%, #7c3aed 100%); }
    .cell.color-3 { background: linear-gradient(145deg, #c2410c 0%, #ea580c 100%); }
    .cell.color-4 { background: linear-gradient(145deg, #0f766e 0%, #0d9488 100%); }
    .cell.color-5 { background: linear-gradient(145deg, #be185d 0%, #db2777 100%); }
    .cell.color-6 { background: linear-gradient(145deg, #4d7c0f 0%, #65a30d 100%); }
    .cell.color-7 { background: linear-gradient(145deg, #b45309 0%, #d97706 100%); }
    .cell.color-8 { background: linear-gradient(145deg, #4338ca 0%, #4f46e5 100%); }
    .cell.color-9 { background: linear-gradient(145deg, #b91c1c 0%, #dc2626 100%); }
    
    .cell:hover:not(.revealed):not(.flagged),
    .cell:active:not(.revealed):not(.flagged) {
      filter: brightness(1.2);
      transform: scale(1.05);
    }
    
    .cell.revealed {
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
      border-color: rgba(255,255,255,0.3);
      cursor: default;
    }
    
    .cell.revealed.blank-mark {
      color: #f87171;
      font-size: 2.8rem;
      font-weight: 800;
    }
    
    .cell.flagged {
      color: #e94560;
    }
    
    .cell.revealed.mine {
      color: #f87171;
    }
    
    .cell.revealed.mine img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    
    .restart-btn {
      margin-top: 20px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-family: inherit;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }
    
    .hint {
      margin-top: 15px;
      font-size: 0.75rem;
      color: #6b7280;
      text-align: center;
    }
    
    .settings-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      font-size: 1.4rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    
    .settings-btn:active { transform: scale(0.95); }
    
    .game-container { position: relative; }
    
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-overlay.show { display: flex; }
    
    .modal {
      background: linear-gradient(145deg, #1b263b 0%, #16213e 100%);
      border-radius: 16px;
      padding: 24px;
      min-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .modal h3 {
      margin-bottom: 16px;
      text-align: center;
      color: #e8e8e8;
    }
    
    .picker-wrap {
      height: 140px;
      overflow: hidden;
      margin: 16px 0;
      position: relative;
    }
    
    .picker-wrap::before, .picker-wrap::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 45px;
      pointer-events: none;
      z-index: 1;
    }
    
    .picker-wrap::before {
      top: 0;
      background: linear-gradient(to bottom, #16213e, transparent);
    }
    
    .picker-wrap::after {
      bottom: 0;
      background: linear-gradient(to top, #16213e, transparent);
    }
    
    .picker-list {
      height: 100%;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    
    .picker-pad { height: 45px; flex-shrink: 0; }
    
    .picker-item {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #a0a0a0;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }
    
    .picker-item.selected { color: #ff6b6b; font-weight: 700; }
    
    .apply-btn {
      width: 100%;
      padding: 12px;
      margin-top: 16px;
      font-size: 1rem;
      font-family: inherit;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }
    
    .apply-btn:active { transform: scale(0.98); }
    
    .hint-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
    }
    
    .hint-toggle span { font-size: 0.9rem; color: #e8e8e8; }
    
    .toggle-btn {
      width: 52px;
      height: 28px;
      border-radius: 14px;
      border: none;
      background: #415a77;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .toggle-btn.on { background: #e94560; }
    
    .toggle-btn::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    
    .toggle-btn.on::after { transform: translateX(24px); }
  </style>
</head>
<body>
  <div class="game-container">
    <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
    <h1>🐄 找牛牛</h1>
    <div class="info-bar">
      <span class="lives-display">❤️ 生命: <span id="livesDisplay">3</span></span>
      <span class="mines-count">牛牛: <span id="minesDisplay">0</span>/<span id="minesTotal">4</span></span>
      <span class="status" id="status"></span>
    </div>
    <div class="color-legend" id="colorLegend"></div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="revealBtn" data-mode="reveal">📖 翻开</button>
      <button class="mode-btn" id="flagBtn" data-mode="flag">🚩 标记</button>
    </div>
    <div class="grid" id="grid"></div>
    <button class="restart-btn" id="restartBtn">重新开始</button>
    <p class="hint">同色相邻 · 每色≥2格≤40% · 每牛9宫格内无他牛</p>
  </div>

  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h3>色组数量</h3>
      <div class="picker-wrap">
        <div class="picker-list" id="pickerList"></div>
      </div>
      <p style="font-size:0.8rem;color:#8b9aaa;text-align:center;margin-top:8px;">将决定：N色 / N牛 / N×N 棋盘</p>
      <div class="hint-toggle">
        <span>显示第一个雷</span>
        <button class="toggle-btn on" id="hintToggle" type="button" title="开关"></button>
      </div>
      <button class="apply-btn" id="applyBtn">调整棋盘</button>
    </div>
  </div>

  <script>
    const LIVES = 3;
    const SIZE_MIN = 4;
    const SIZE_MAX = 10;

    let ROWS = 4;
    let COLS = 4;
    let MINES = 4;
    let showHintMine = true;

    let grid = [];
    let minePositions = [];
    let minesRevealed = 0;
    let flaggedCount = 0;
    let lives = LIVES;
    let gameOver = false;
    let currentMode = 'reveal'; // 'reveal' 或 'flag'
    let initRetryCount = 0;

    const gridEl = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const minesDisplayEl = document.getElementById('minesDisplay');
    const livesDisplayEl = document.getElementById('livesDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const revealBtn = document.getElementById('revealBtn');
    const flagBtn = document.getElementById('flagBtn');

    function initGame() {
      grid = [];
      minePositions = [];
      minesRevealed = 0;
      flaggedCount = 0;
      lives = LIVES;
      gameOver = false;
      statusEl.textContent = '';
      statusEl.className = 'status';
      minesDisplayEl.textContent = '0';
      document.getElementById('minesTotal').textContent = MINES;
      livesDisplayEl.textContent = LIVES;
      currentMode = 'reveal';
      updateModeButtons();

      // 创建空网格
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          grid[r][c] = { isMine: false, revealed: false, flagged: false, colorIndex: -1 };
        }
      }
      assignColorsContiguous();
      updateColorLegend();

      // 雷的生成规则：每色1雷、每雷周围9宫格无其他雷、每行每列各1雷
      if (!placeMinesWithRules()) {
        if (++initRetryCount < 20) {
          initGame();
          return;
        }
        initRetryCount = 0;
        // 回退：仅满足每色1雷
        for (let color = 0; color < MINES; color++) {
          const cells = [];
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c].colorIndex === color) cells.push([r, c]);
          const [r, c] = cells[Math.floor(Math.random() * cells.length)];
          grid[r][c].isMine = true;
          minePositions.push([r, c]);
        }
      } else {
        initRetryCount = 0;
      }

      if (showHintMine) {
        const hintMine = minePositions[Math.floor(Math.random() * minePositions.length)];
        grid[hintMine[0]][hintMine[1]].revealed = true;
        minesRevealed = 1;
        minesDisplayEl.textContent = '1';
      }

      renderGrid();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function assignColorsContiguous() {
      const total = ROWS * COLS;
      const minPer = 2;
      const maxPer = Math.floor(total * 0.4);
      let base = Math.floor(total / MINES);
      let perColor = Array(MINES).fill(base);
      for (let i = 0; i < total - base * MINES; i++) perColor[i]++;
      perColor = perColor.map(c => Math.max(minPer, Math.min(maxPer, c)));
      let sum = perColor.reduce((a, b) => a + b, 0);
      while (sum !== total) {
        if (sum < total) {
          const i = perColor.findIndex(c => c < maxPer);
          if (i >= 0) { perColor[i]++; sum++; } else break;
        } else {
          const i = perColor.findIndex(c => c > minPer);
          if (i >= 0) { perColor[i]--; sum--; } else break;
        }
      }
      const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
      const is4Adj = (r1,c1,r2,c2) => Math.abs(r1-r2)+Math.abs(c1-c2)===1;
      const getNeighbors = (r,c) => dirs.map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS);

      let seeds = [];
      for (let tryCount = 0; tryCount < 200; tryCount++) {
        const all = [];
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) all.push([r,c]);
        shuffle(all);
        seeds = [[all[0],0]];
        for (let i = 1; i < all.length && seeds.length < MINES; i++) {
          const [r,c] = all[i];
          if (seeds.every(([[sr,sc],_]) => !is4Adj(r,c,sr,sc))) {
            seeds.push([[r,c], seeds.length]);
          }
        }
        if (seeds.length === MINES) break;
      }
      seeds.forEach(([[r,c]], color) => { grid[r][c].colorIndex = color; });

      const frontiers = seeds.map(([[r,c]]) => [[r,c]]);
      let assigned = MINES;
      while (assigned < total) {
        let grew = false;
        for (let color = 0; color < MINES; color++) {
          const count = [...Array(ROWS)].flatMap((_,r)=>[...Array(COLS)].map((_,c)=>[r,c])).filter(([r,c])=>grid[r][c].colorIndex===color).length;
          if (count >= perColor[color]) continue;
          const next = [];
          for (const [r,c] of frontiers[color]) {
            for (const [nr,nc] of getNeighbors(r,c)) {
              if (grid[nr][nc].colorIndex === -1) {
                grid[nr][nc].colorIndex = color;
                assigned++;
                next.push([nr,nc]);
                grew = true;
                break;
              }
            }
            if (grew) break;
          }
          if (grew) {
            frontiers[color] = [...frontiers[color], ...next];
            break;
          }
        }
        if (!grew) {
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
            if (grid[r][c].colorIndex === -1) {
              const adj = getNeighbors(r,c).find(([nr,nc])=>grid[nr][nc].colorIndex>=0);
              grid[r][c].colorIndex = adj ? grid[adj[0]][adj[1]].colorIndex : 0;
            }
          }
          break;
        }
      }
    }

    function placeMinesWithRules() {
      const colorGroups = Array.from({ length: MINES }, () => []);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          colorGroups[grid[r][c].colorIndex].push([r, c]);
        }
      }
      const inSame9Grid = (r1, c1, r2, c2) =>
        Math.abs(r1 - r2) <= 1 && Math.abs(c1 - c2) <= 1;
      const validWith = (pos, existing) => {
        const [r, c] = pos;
        for (const [er, ec] of existing) {
          if (r === er || c === ec || inSame9Grid(r, c, er, ec)) return false;
        }
        return true;
      };

      for (let attempt = 0; attempt < 500; attempt++) {
        colorGroups.forEach(g => shuffle(g));
        const chosen = [];
        for (let color = 0; color < MINES; color++) {
          const valid = colorGroups[color].filter((pos) => validWith(pos, chosen));
          if (valid.length === 0) break;
          chosen.push(valid[Math.floor(Math.random() * valid.length)]);
        }
        if (chosen.length === MINES) {
          chosen.forEach(([r, c]) => {
            grid[r][c].isMine = true;
            minePositions.push([r, c]);
          });
          return true;
        }
      }
      return false;
    }

    function renderGrid() {
      const cellSize = Math.min(80, Math.floor(400 / ROWS));
      gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${cellSize}px)`;
      gridEl.style.gridTemplateRows = `repeat(${ROWS}, ${cellSize}px)`;
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cellData = grid[r][c];
          const cell = document.createElement('div');
          cell.className = `cell color-${cellData.colorIndex}`;
          cell.style.width = cellSize + 'px';
          cell.style.height = cellSize + 'px';
          cell.dataset.r = r;
          cell.dataset.c = c;
          if (cellData.revealed) {
            cell.classList.add('revealed');
            if (cellData.isMine) {
              cell.classList.add('mine');
              const img = document.createElement('img');
              img.src = 'mine-icon.png';
              img.alt = '牛牛';
              cell.appendChild(img);
            } else {
              cell.classList.add('blank-mark');
              cell.textContent = '×';
            }
          } else if (cellData.flagged) {
            cell.classList.add('flagged');
            cell.textContent = '🚩';
          }

          cell.addEventListener('click', (e) => {
            e.preventDefault();
            if (currentMode === 'reveal') {
              handleClick(r, c);
            } else {
              handleRightClick(r, c);
            }
          });
          cell.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            handleRightClick(r, c);
          });

          gridEl.appendChild(cell);
        }
      }
    }

    function handleClick(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed || cell.flagged) return;

      cell.revealed = true;

      if (cell.isMine) {
        minesRevealed++;
        minesDisplayEl.textContent = minesRevealed;
        checkWin();
        renderGrid();
        return;
      }

      // 点击空白区域（安全格）损失1生命
      lives--;
      livesDisplayEl.textContent = lives;
      if (lives <= 0) {
        gameOver = true;
        revealAllMines();
        statusEl.textContent = '💔 生命耗尽！';
        statusEl.classList.add('lose');
      }

      renderGrid();
    }

    function handleRightClick(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed) return;

      cell.flagged = !cell.flagged;
      renderGrid();
    }

    function revealAllMines() {
      minePositions.forEach(([r, c]) => {
        grid[r][c].revealed = true;
      });
      renderGrid();
    }

    function checkWin() {
      if (minesRevealed === MINES) {
        gameOver = true;
        statusEl.textContent = '🎉 全部牛牛已找出！';
        statusEl.classList.add('win');
      }
    }

    function updateModeButtons() {
      revealBtn.classList.toggle('active', currentMode === 'reveal');
      flagBtn.classList.toggle('active', currentMode === 'flag');
    }

    revealBtn.addEventListener('click', (e) => {
      e.preventDefault();
      currentMode = 'reveal';
      updateModeButtons();
    });
    flagBtn.addEventListener('click', (e) => {
      e.preventDefault();
      currentMode = 'flag';
      updateModeButtons();
    });
    restartBtn.addEventListener('click', initGame);

    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const pickerList = document.getElementById('pickerList');
    const applyBtn = document.getElementById('applyBtn');

    function initPicker() {
      pickerList.innerHTML = '';
      const topPad = document.createElement('div');
      topPad.className = 'picker-pad';
      pickerList.appendChild(topPad);
      for (let n = SIZE_MIN; n <= SIZE_MAX; n++) {
        const item = document.createElement('div');
        item.className = 'picker-item' + (n === MINES ? ' selected' : '');
        item.textContent = n;
        item.dataset.value = n;
        pickerList.appendChild(item);
      }
      const bottomPad = document.createElement('div');
      bottomPad.className = 'picker-pad';
      pickerList.appendChild(bottomPad);
    }

    function updatePickerScroll() {
      const itemHeight = 50;
      const padHeight = 45;
      const wrapHeight = 140;
      const idx = MINES - SIZE_MIN;
      pickerList.scrollTop = padHeight + idx * itemHeight - wrapHeight / 2 + itemHeight / 2;
      setTimeout(() => pickerList.dispatchEvent(new Event('scroll')), 50);
    }

    pickerList.addEventListener('scroll', () => {
      const items = pickerList.querySelectorAll('.picker-item');
      const wrapRect = pickerList.parentElement.getBoundingClientRect();
      const center = wrapRect.top + wrapRect.height / 2;
      let closestVal = SIZE_MIN;
      let minDist = 999;
      items.forEach((item, i) => {
        const rect = item.getBoundingClientRect();
        const itemCenter = rect.top + rect.height / 2;
        const dist = Math.abs(itemCenter - center);
        if (dist < minDist) {
          minDist = dist;
          closestVal = parseInt(item.dataset.value, 10);
        }
      });
      items.forEach(item => item.classList.toggle('selected', parseInt(item.dataset.value, 10) === closestVal));
    });

    settingsBtn.addEventListener('click', () => {
      initPicker();
      updatePickerScroll();
      hintToggle.classList.toggle('on', showHintMine);
      settingsModal.classList.add('show');
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.classList.remove('show');
    });

    const hintToggle = document.getElementById('hintToggle');
    hintToggle.addEventListener('click', () => {
      showHintMine = !showHintMine;
      hintToggle.classList.toggle('on', showHintMine);
    });

    applyBtn.addEventListener('click', () => {
      const selected = pickerList.querySelector('.picker-item.selected');
      const n = selected ? parseInt(selected.dataset.value, 10) : MINES;
      ROWS = COLS = MINES = n;
      showHintMine = hintToggle.classList.contains('on');
      settingsModal.classList.remove('show');
      initGame();
    });

    function updateColorLegend() {
      const legend = document.getElementById('colorLegend');
      legend.innerHTML = '';
      for (let i = 0; i < MINES; i++) {
        const span = document.createElement('span');
        span.innerHTML = `<i class="swatch c${i % 10}"></i>色组${i + 1}`;
        legend.appendChild(span);
      }
    }

    initGame();
  </script>
</body>
</html>
